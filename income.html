<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>税后收入与月供承压</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <a class="top-back" href="./index.html">← 回到首页</a>

      <section class="card">
        <p class="hero-kicker">收入测算页</p>
        <h1>💰 算算实际到手</h1>
        <p class="helper-mood">看清税后收入，做决策会更踏实。</p>
      </section>

      <section class="card">
        <h2>收入参数</h2>
        <div class="saving-grid">
          <div class="saving-item">
            <label for="iGross">💼 税前月收入（元）</label>
            <input id="iGross" type="number" min="0" step="100" value="12000" />
            <input id="iGrossRange" type="range" min="0" max="200000" step="100" value="12000" />
          </div>
          <div class="saving-item">
            <label for="iInsurance">🏦 五险一金比例（%）</label>
            <input id="iInsurance" type="number" min="0" max="30" step="0.1" value="12" />
            <input id="iInsuranceRange" type="range" min="0" max="30" step="0.1" value="12" />
          </div>
          <div class="saving-item">
            <label for="iDeduction">📚 专项附加扣除（元/月）</label>
            <input id="iDeduction" type="number" min="0" step="100" value="0" />
            <input id="iDeductionRange" type="range" min="0" max="20000" step="100" value="0" />
          </div>
          <div class="saving-item">
            <label for="iMortgage">🏠 月供（元/月）</label>
            <input id="iMortgage" type="number" min="0" step="100" />
            <input id="iMortgageRange" type="range" min="0" max="100000" step="100" value="0" />
          </div>
        </div>
        <p id="iError" class="error-msg"></p>
      </section>

      <section class="card result-card">
        <h2>📊 结果</h2>
        <div class="result-grid">
          <div class="metric-card">
            <p class="metric-label">税后月收入</p>
            <p id="iNet" class="metric-value">-</p>
          </div>
          <div class="metric-card">
            <p class="metric-label">个人所得税</p>
            <p id="iTax" class="metric-value">-</p>
          </div>
          <div class="metric-card">
            <p class="metric-label">扣除月供后剩余</p>
            <p id="iRemain" class="metric-value">-</p>
          </div>
        </div>
        <p id="iHint" class="next-hint">填完后我会告诉你每月压力感受。</p>
      </section>

      <section class="card">
        <a class="next-action income" href="./index.html">
          <span class="action-main">🏡 回到“我该租房还是买房？”首页</span>
          <span class="action-sub">继续比较方案，调整参数</span>
        </a>
      </section>
    </main>

    <script src="./income.js"></script>
  </body>
</html>
